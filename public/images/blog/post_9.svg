<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="accent9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg9)"/>
  <circle cx="900" cy="100" r="300" fill="url(#accent9)" opacity="0.3"/>
  <circle cx="200" cy="550" r="200" fill="url(#accent9)" opacity="0.2"/>
  <!-- Calendar/routine icon -->
  <rect x="480" y="160" width="240" height="200" rx="12" fill="#fff" opacity="0.15"/>
  <rect x="480" y="160" width="240" height="50" rx="12" fill="#fff" opacity="0.25"/>
  <rect x="480" y="200" width="240" height="10" rx="0" fill="#fff" opacity="0.15"/>
  <!-- Calendar dots/checkmarks -->
  <circle cx="520" cy="240" r="10" fill="#4ade80" opacity="0.7"/>
  <circle cx="560" cy="240" r="10" fill="#4ade80" opacity="0.7"/>
  <circle cx="600" cy="240" r="10" fill="#4ade80" opacity="0.7"/>
  <circle cx="640" cy="240" r="10" fill="#fbbf24" opacity="0.7"/>
  <circle cx="680" cy="240" r="10" fill="#e5e7eb" opacity="0.4"/>
  <circle cx="520" cy="280" r="10" fill="#4ade80" opacity="0.7"/>
  <circle cx="560" cy="280" r="10" fill="#4ade80" opacity="0.7"/>
  <circle cx="600" cy="280" r="10" fill="#fbbf24" opacity="0.7"/>
  <circle cx="640" cy="280" r="10" fill="#e5e7eb" opacity="0.4"/>
  <circle cx="680" cy="280" r="10" fill="#e5e7eb" opacity="0.4"/>
  <circle cx="520" cy="320" r="10" fill="#4ade80" opacity="0.7"/>
  <circle cx="560" cy="320" r="10" fill="#e5e7eb" opacity="0.4"/>
  <circle cx="600" cy="320" r="10" fill="#e5e7eb" opacity="0.4"/>
  <circle cx="640" cy="320" r="10" fill="#e5e7eb" opacity="0.4"/>
  <circle cx="680" cy="320" r="10" fill="#e5e7eb" opacity="0.4"/>
  <!-- Checkmarks on green dots -->
  <text x="520" y="246" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">&#10003;</text>
  <text x="560" y="246" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">&#10003;</text>
  <text x="600" y="246" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">&#10003;</text>
  <text x="520" y="286" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">&#10003;</text>
  <text x="560" y="286" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">&#10003;</text>
  <text x="520" y="326" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">&#10003;</text>
  <!-- Heart icon -->
  <text x="600" y="430" font-family="Arial" font-size="48" fill="#fff" text-anchor="middle" opacity="0.3">&#9829;</text>
  <!-- Smiley face -->
  <circle cx="600" cy="420" r="40" fill="none" stroke="#fff" stroke-width="3" opacity="0.2"/>
  <!-- Title -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="30" fill="#fff" text-anchor="middle" font-weight="bold" opacity="0.9">Rutina de estudio sin gritos ni castigos</text>
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#fed7aa" text-anchor="middle" opacity="0.7">Disciplina positiva para el aprendizaje en casa</text>
